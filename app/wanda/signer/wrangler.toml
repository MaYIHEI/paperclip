name = "wanda-signer"
main = "worker.js"
compatibility_date = "2024-09-23"

# 自有域名(workers.dev 被墙,国内直连不通) —— 绑到 CF 上的 byteden.xyz
routes = [
  { pattern = "wanda-sign.byteden.xyz", custom_domain = true }
]

# index_bg.wasm 通过 import 自动打包(Wrangler 内置 .wasm 模块支持)

# 可选:开启访问限制。取消注释并改成自己的随机串,Loon 脚本里 SIGNER_URL 末尾带 ?key=同值
# [vars]
# AUTH_KEY = "change-me-to-a-random-string"
